services:
  portfolio:
    build:
      context: .
      target: development
    container_name: abhipuri-portfolio
    ports:
      - "5173:5173"
    volumes:
      # Sync local edits into the container for instant Vite hot reload.
      - .:/app
      # Keep Linux container dependencies isolated from the host bind mount.
      - portfolio_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    # npm install runs inside the container-backed node_modules volume.
    # You only need a rebuild when Dockerfile/base-image behavior changes.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  portfolio_node_modules:
